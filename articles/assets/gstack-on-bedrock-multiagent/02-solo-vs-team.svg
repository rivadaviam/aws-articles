<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1200" height="675" fill="#1E2A38"/>

  <!-- title -->
  <text x="60" y="64" fill="#F5F7FA" font-size="38" font-weight="700">The same six agents, two different answers</text>
  <text x="60" y="100" fill="#8FA3B8" font-size="25">Where Bedrock's extra work is overhead, and where it's insurance</text>

  <!-- LEFT column header: Solo -->
  <rect x="60" y="126" width="520" height="72" fill="#2A3B4F"/>
  <text x="88" y="158" fill="#F5F7FA" font-size="27" font-weight="700">Solo / early startup</text>
  <text x="560" y="158" fill="#8FA3B8" font-size="22" text-anchor="end">overhead</text>
  <text x="88" y="186" fill="#8FA3B8" font-size="21">Stay on gstack. The 30 seconds is the right answer.</text>

  <!-- RIGHT column header: Team -->
  <rect x="620" y="126" width="520" height="72" fill="#2A3B4F" stroke="#FF9900" stroke-width="4"/>
  <text x="648" y="158" fill="#F5F7FA" font-size="27" font-weight="700">Team of 5+ / compliance</text>
  <text x="1120" y="158" fill="#FF9900" font-size="22" text-anchor="end" font-weight="700">insurance</text>
  <text x="648" y="186" fill="#8FA3B8" font-size="21">Once "which agent approved this?" gets asked.</text>

  <!-- ROW 1: Audit -->
  <text x="60" y="242" fill="#FF9900" font-size="23" font-weight="700">Audit</text>
  <rect x="60" y="252" width="520" height="58" fill="#2A3B4F"/>
  <text x="88" y="288" fill="#8FA3B8" font-size="23">No trail. Can't reconstruct decisions.</text>
  <rect x="620" y="252" width="520" height="58" fill="#2A3B4F"/>
  <text x="648" y="288" fill="#F5F7FA" font-size="23">CloudTrail logs every tool call.</text>

  <!-- ROW 2: Access control -->
  <text x="60" y="346" fill="#FF9900" font-size="23" font-weight="700">Access control</text>
  <rect x="60" y="356" width="520" height="58" fill="#2A3B4F"/>
  <text x="88" y="392" fill="#8FA3B8" font-size="23">All agents run as you, full access.</text>
  <rect x="620" y="356" width="520" height="58" fill="#2A3B4F"/>
  <text x="648" y="392" fill="#F5F7FA" font-size="23">One least-privilege IAM role each.</text>

  <!-- ROW 3: Billing -->
  <text x="60" y="450" fill="#FF9900" font-size="23" font-weight="700">Billing</text>
  <rect x="60" y="460" width="520" height="58" fill="#2A3B4F"/>
  <text x="88" y="496" fill="#8FA3B8" font-size="23">Individual subscription.</text>
  <rect x="620" y="460" width="520" height="58" fill="#2A3B4F"/>
  <text x="648" y="496" fill="#F5F7FA" font-size="23">Central, by team and project.</text>

  <!-- ROW 4: Scale -->
  <text x="60" y="554" fill="#FF9900" font-size="23" font-weight="700">Scale</text>
  <rect x="60" y="564" width="520" height="58" fill="#2A3B4F"/>
  <text x="88" y="600" fill="#8FA3B8" font-size="23">One developer, one session.</text>
  <rect x="620" y="564" width="520" height="58" fill="#2A3B4F"/>
  <text x="648" y="600" fill="#F5F7FA" font-size="23">Many devs, parallel, no collision.</text>

  <!-- footer -->
  <text x="60" y="662" fill="#8FA3B8" font-size="22">Build. Document. Share. Repeat.</text>
  <text x="1140" y="662" fill="#8FA3B8" font-size="22" text-anchor="end">Build-to-Learn</text>
</svg>
