<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1200" height="675" fill="#1E2A38"/>

  <!-- title -->
  <text x="60" y="72" fill="#F5F7FA" font-size="40" font-weight="700">The same six roles, now with an audit floor</text>
  <text x="60" y="112" fill="#8FA3B8" font-size="26">Bedrock orchestrator routes work to specialized sub-agents</text>

  <!-- orchestrator box (centered) -->
  <rect x="410" y="150" width="380" height="80" fill="#2A3B4F" stroke="#FF9900" stroke-width="4"/>
  <text x="600" y="184" fill="#F5F7FA" font-size="28" font-weight="700" text-anchor="middle">Bedrock Orchestrator</text>
  <text x="600" y="214" fill="#FF9900" font-size="22" text-anchor="middle" font-weight="700">the coordinator</text>

  <!-- routing lines from orchestrator to 4 sub-agents -->
  <line x1="187" y1="290" x2="187" y2="270" stroke="#3A4D63" stroke-width="3"/>
  <line x1="462" y1="290" x2="462" y2="270" stroke="#3A4D63" stroke-width="3"/>
  <line x1="737" y1="290" x2="737" y2="270" stroke="#3A4D63" stroke-width="3"/>
  <line x1="1012" y1="290" x2="1012" y2="270" stroke="#3A4D63" stroke-width="3"/>
  <line x1="187" y1="270" x2="1012" y2="270" stroke="#3A4D63" stroke-width="3"/>
  <line x1="600" y1="230" x2="600" y2="270" stroke="#3A4D63" stroke-width="3"/>

  <!-- sub-agent boxes: w=255 x: 60,335,610,885 ; y=290 h=160 -->
  <!-- CEO -->
  <rect x="60" y="290" width="255" height="160" fill="#2A3B4F"/>
  <text x="187" y="330" fill="#F5F7FA" font-size="27" font-weight="700" text-anchor="middle">CEO</text>
  <text x="187" y="366" fill="#8FA3B8" font-size="22" text-anchor="middle">validates the</text>
  <text x="187" y="392" fill="#8FA3B8" font-size="22" text-anchor="middle">business case</text>
  <text x="187" y="428" fill="#FF9900" font-size="21" text-anchor="middle" font-weight="700">Guardrails</text>

  <!-- Engineering Manager -->
  <rect x="335" y="290" width="255" height="160" fill="#2A3B4F"/>
  <text x="462" y="330" fill="#F5F7FA" font-size="27" font-weight="700" text-anchor="middle">Eng Manager</text>
  <text x="462" y="366" fill="#8FA3B8" font-size="22" text-anchor="middle">sets the</text>
  <text x="462" y="392" fill="#8FA3B8" font-size="22" text-anchor="middle">architecture</text>
  <text x="462" y="428" fill="#FF9900" font-size="21" text-anchor="middle" font-weight="700">Knowledge Base</text>

  <!-- Designer -->
  <rect x="610" y="290" width="255" height="160" fill="#2A3B4F"/>
  <text x="737" y="330" fill="#F5F7FA" font-size="27" font-weight="700" text-anchor="middle">Designer</text>
  <text x="737" y="366" fill="#8FA3B8" font-size="22" text-anchor="middle">generates and</text>
  <text x="737" y="392" fill="#8FA3B8" font-size="22" text-anchor="middle">scores variants</text>
  <text x="737" y="428" fill="#FF9900" font-size="21" text-anchor="middle" font-weight="700">AgentCore evals</text>

  <!-- Release Manager -->
  <rect x="885" y="290" width="255" height="160" fill="#2A3B4F"/>
  <text x="1012" y="330" fill="#F5F7FA" font-size="27" font-weight="700" text-anchor="middle">Release Mgr</text>
  <text x="1012" y="366" fill="#8FA3B8" font-size="22" text-anchor="middle">runs the</text>
  <text x="1012" y="392" fill="#8FA3B8" font-size="22" text-anchor="middle">ship cycle</text>
  <text x="1012" y="428" fill="#FF9900" font-size="21" text-anchor="middle" font-weight="700">CodePipeline · MCP</text>

  <!-- note: roles 5 and 6 -->
  <text x="600" y="482" fill="#8FA3B8" font-size="21" text-anchor="middle">(roles 5 and 6: confirm against the gstack repo before you build)</text>

  <!-- cross-cutting audit floor -->
  <rect x="60" y="508" width="1080" height="88" fill="#2A3B4F" stroke="#4FC3F7" stroke-width="3"/>
  <text x="82" y="542" fill="#4FC3F7" font-size="24" font-weight="700">Audit floor, under every agent</text>
  <text x="82" y="578" fill="#8FA3B8" font-size="22">CloudTrail: every decision logged  ·  CloudWatch: latency + tokens  ·  IAM: one least-privilege role each</text>

  <!-- footer -->
  <text x="60" y="640" fill="#8FA3B8" font-size="22">Pattern: multi-agent orchestration on Bedrock AgentCore, applied to gstack</text>
  <text x="60" y="666" fill="#8FA3B8" font-size="22">Build. Document. Share. Repeat.</text>
  <text x="1140" y="666" fill="#8FA3B8" font-size="22" text-anchor="end">Build-to-Learn</text>
</svg>
