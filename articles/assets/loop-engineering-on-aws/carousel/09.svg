  <!-- question card -->
  <rect x="80" y="880" width="920" height="220" rx="8" fill="#2A3B4F"/>
  <text x="120" y="960" font-size="44" font-weight="700" fill="#F5F7FA">Which component is your</text>
  <text x="120" y="1020" font-size="44" font-weight="700" fill="#FF9900">weakest link today?</text>

  <text x="80" y="1200" font-size="40" font-weight="700" fill="#8FA3B8">Build the loop. Stay the engineer.</text>

  <text x="80" y="1300" font-size="24" fill="#8FA3B8">Build. Document. Share. Repeat.</text>
</svg>
