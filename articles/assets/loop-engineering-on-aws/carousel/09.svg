<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1080" height="1350" fill="#1E2A38"/>

  <text x="1000" y="110" text-anchor="end" font-family="SF Mono, Menlo, Monaco, monospace" font-size="34" fill="#8FA3B8">9/9</text>

  <rect x="80" y="300" width="120" height="14" fill="#FF9900"/>

  <!-- headline -->
  <text x="80" y="440" font-size="66" font-weight="700" fill="#F5F7FA">The loop outlives</text>
  <text x="80" y="514" font-size="66" font-weight="700" fill="#F5F7FA">the session.</text>
  <text x="80" y="600" font-size="66" font-weight="700" fill="#FF9900">That's the point.</text>

  <!-- body -->
