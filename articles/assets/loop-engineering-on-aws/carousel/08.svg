<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1080" height="1350" fill="#1E2A38"/>

  <text x="1000" y="110" text-anchor="end" font-family="SF Mono, Menlo, Monaco, monospace" font-size="34" fill="#8FA3B8">8/9</text>

  <text x="80" y="200" font-size="36" font-weight="700" fill="#FF9900" letter-spacing="2">COMPONENT 6 · MEMORY</text>

  <text x="80" y="330" font-size="66" font-weight="700" fill="#F5F7FA">What survives</text>
  <text x="80" y="404" font-size="66" font-weight="700" fill="#F5F7FA">between runs.</text>

  <!-- two service cards -->
  <rect x="80" y="490" width="445" height="200" rx="8" fill="#2A3B4F"/>
  <text x="120" y="555" font-size="52" font-weight="700" fill="#FF9900">S3</text>
  <text x="120" y="615" font-size="34" fill="#F5F7FA">long-term</text>
  <text x="120" y="660" font-size="30" fill="#8FA3B8">context files, artifacts</text>

  <rect x="555" y="490" width="445" height="200" rx="8" fill="#2A3B4F"/>
  <text x="595" y="555" font-size="52" font-weight="700" fill="#FF9900">DynamoDB</text>
  <text x="595" y="615" font-size="34" fill="#F5F7FA">short-term</text>
  <text x="595" y="660" font-size="30" fill="#8FA3B8">fast state, checkpoints</text>

  <text x="80" y="800" font-size="42" fill="#F5F7FA">The session ID is the thread. It</text>
  <text x="80" y="854" font-size="42" fill="#F5F7FA">ties the trigger to state to</text>
  <text x="80" y="908" font-size="42" fill="#F5F7FA">context across every dispatch.</text>

  <text x="80" y="1010" font-size="42" fill="#F5F7FA">Without it, six Lambda runs are</text>
  <text x="80" y="1064" font-size="42" fill="#F5F7FA">six strangers, not one loop.</text>

  <text x="80" y="1170" font-size="38" font-weight="700" fill="#8FA3B8">Cycle two knows what cycle one did.</text>

  <text x="80" y="1300" font-size="24" fill="#8FA3B8">Build. Document. Share. Repeat.</text>
</svg>
