<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1080" height="1350" fill="#1E2A38"/>

  <text x="1000" y="110" text-anchor="end" font-family="SF Mono, Menlo, Monaco, monospace" font-size="34" fill="#8FA3B8">3/9</text>

  <text x="80" y="200" font-size="36" font-weight="700" fill="#FF9900" letter-spacing="2">COMPONENT 1 · AUTOMATIONS</text>

  <!-- osmani name -> question it answers -->
  <text x="80" y="330" font-size="66" font-weight="700" fill="#F5F7FA">The trigger that</text>
  <text x="80" y="404" font-size="66" font-weight="700" fill="#F5F7FA">replaces you typing.</text>

  <!-- service card -->
  <rect x="80" y="500" width="920" height="200" rx="8" fill="#2A3B4F"/>
  <text x="120" y="575" font-size="34" fill="#8FA3B8">AWS service</text>
  <text x="120" y="645" font-size="56" font-weight="700" fill="#FF9900">EventBridge + Lambda</text>

  <!-- explanation -->
  <text x="80" y="810" font-size="42" fill="#F5F7FA">EventBridge wakes the loop on a</text>
  <text x="80" y="864" font-size="42" fill="#F5F7FA">cron tick or an event pattern.</text>

  <text x="80" y="960" font-size="42" fill="#F5F7FA">Lambda is the dispatcher: it sets</text>
  <text x="80" y="1014" font-size="42" fill="#F5F7FA">the objective and holds the</text>
  <text x="80" y="1068" font-size="42" fill="#F5F7FA">circuit breaker.</text>

  <text x="80" y="1170" font-size="40" font-weight="700" fill="#FF9900">No human types "go." That's the loop.</text>

  <text x="80" y="1300" font-size="24" fill="#8FA3B8">Build. Document. Share. Repeat.</text>
</svg>
