<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1080" height="1350" fill="#1E2A38"/>

  <text x="1000" y="110" text-anchor="end" font-family="SF Mono, Menlo, Monaco, monospace" font-size="34" fill="#8FA3B8">2/9</text>

  <text x="80" y="200" font-size="36" font-weight="700" fill="#FF9900" letter-spacing="2">THE SHIFT</text>

  <text x="80" y="320" font-size="60" font-weight="700" fill="#F5F7FA">A prompt is a task.</text>
  <text x="80" y="392" font-size="60" font-weight="700" fill="#FF9900">A loop is a system.</text>

  <!-- prompt row -->
  <rect x="80" y="470" width="920" height="120" rx="8" fill="#2A3B4F"/>
  <text x="120" y="528" font-size="42" font-weight="700" fill="#8FA3B8">Prompting</text>
  <text x="120" y="572" font-size="32" fill="#8FA3B8">you type "go" every single time</text>

  <!-- loop row -->
  <rect x="80" y="620" width="920" height="120" rx="8" fill="#2A3B4F"/>
  <text x="120" y="678" font-size="42" font-weight="700" fill="#F5F7FA">Loop engineering</text>
  <text x="120" y="722" font-size="32" fill="#8FA3B8">the system fires itself, then hands you decisions</text>

  <!-- the four parts -->
  <text x="80" y="850" font-size="40" fill="#F5F7FA">Four moving parts, self-orchestrating:</text>
  <text x="80" y="930" font-size="46" font-weight="700" fill="#FF9900">trigger</text>
  <text x="330" y="930" font-size="46" font-weight="700" fill="#F5F7FA">→ memory</text>
  <text x="80" y="1000" font-size="46" font-weight="700" fill="#F5F7FA">→ tools</text>
  <text x="330" y="1000" font-size="46" font-weight="700" fill="#F5F7FA">→ agent</text>

  <text x="80" y="1120" font-size="38" fill="#8FA3B8">"A recursive objective where AI</text>
  <text x="80" y="1170" font-size="38" fill="#8FA3B8">iterates until complete." — Osmani</text>

  <text x="80" y="1300" font-size="24" fill="#8FA3B8">Build. Document. Share. Repeat.</text>
</svg>
