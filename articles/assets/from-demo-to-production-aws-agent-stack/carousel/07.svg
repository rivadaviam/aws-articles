<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1080" height="1350" fill="#1E2A38"/>

  <text x="1000" y="110" text-anchor="end" font-family="SF Mono, Menlo, Monaco, monospace" font-size="34" fill="#8FA3B8">7/9</text>

  <text x="80" y="200" font-family="SF Mono, Menlo, Monaco, monospace" font-size="40" font-weight="700" fill="#FF9900">GATE 5</text>

  <!-- headline -->
  <text x="80" y="330" font-size="70" font-weight="700" fill="#F5F7FA">Deploy against</text>
  <text x="80" y="414" font-size="70" font-weight="700" fill="#F5F7FA">real numbers.</text>

  <!-- number 1 -->
  <text x="80" y="560" font-family="SF Mono, Menlo, Monaco, monospace" font-size="82" font-weight="700" fill="#FF9900">200 TPS</text>
  <text x="80" y="612" font-size="36" fill="#8FA3B8">per agent</text>

  <!-- number 2 -->
  <text x="80" y="740" font-family="SF Mono, Menlo, Monaco, monospace" font-size="82" font-weight="700" fill="#FF9900">5,000</text>
  <text x="80" y="792" font-size="36" fill="#8FA3B8">sessions · us-east-1 / us-west-2</text>

  <!-- number 3 -->
  <text x="80" y="920" font-family="SF Mono, Menlo, Monaco, monospace" font-size="82" font-weight="700" fill="#8FA3B8">2,500</text>
  <text x="80" y="972" font-size="36" fill="#8FA3B8">sessions · everywhere else</text>

  <!-- muted punch -->
  <rect x="80" y="1050" width="6" height="140" fill="#FF9900"/>
  <text x="120" y="1095" font-size="38" fill="#8FA3B8">Adjustable defaults — if you</text>
  <text x="120" y="1143" font-size="38" fill="#8FA3B8">knew to ask before launch.</text>

  <text x="80" y="1300" font-size="24" fill="#8FA3B8">Build. Document. Share. Repeat.</text>
</svg>
