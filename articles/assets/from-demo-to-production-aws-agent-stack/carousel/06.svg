<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1080" height="1350" fill="#1E2A38"/>

  <text x="1000" y="110" text-anchor="end" font-family="SF Mono, Menlo, Monaco, monospace" font-size="34" fill="#8FA3B8">6/9</text>

  <text x="80" y="200" font-family="SF Mono, Menlo, Monaco, monospace" font-size="40" font-weight="700" fill="#FF9900">GATE 4</text>

  <!-- headline -->
  <text x="80" y="360" font-size="70" font-weight="700" fill="#F5F7FA">Lock policy</text>
  <text x="80" y="444" font-size="70" font-weight="700" fill="#F5F7FA">while the</text>
  <text x="80" y="528" font-size="70" font-weight="700" fill="#F5F7FA">surface is small.</text>

  <!-- contrast blocks -->
  <rect x="80" y="640" width="920" height="180" rx="8" fill="#2A3B4F"/>
  <text x="120" y="710" font-size="40" fill="#F5F7FA">Tool access on a two-tool agent:</text>
  <text x="120" y="775" font-size="46" font-weight="700" fill="#FF9900">a five-minute job.</text>

  <rect x="80" y="850" width="920" height="180" rx="8" fill="#2A3B4F"/>
  <text x="120" y="920" font-size="40" fill="#F5F7FA">Retrofitting it later:</text>
  <text x="120" y="985" font-size="46" font-weight="700" fill="#FF6B6B">a project.</text>

  <text x="80" y="1300" font-size="24" fill="#8FA3B8">Build. Document. Share. Repeat.</text>
</svg>
