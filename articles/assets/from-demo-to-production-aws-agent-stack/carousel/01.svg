<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1080" height="1350" fill="#1E2A38"/>

  <!-- slide indicator -->
  <text x="1000" y="110" text-anchor="end" font-family="SF Mono, Menlo, Monaco, monospace" font-size="34" fill="#8FA3B8">1/9</text>

  <!-- accent bar -->
  <rect x="80" y="360" width="120" height="14" fill="#FF9900"/>

  <!-- headline block -->
  <text x="80" y="500" font-size="96" font-weight="700" fill="#F5F7FA">AWS agents</text>
  <text x="80" y="612" font-size="96" font-weight="700" fill="#F5F7FA">went GA.</text>

  <text x="80" y="800" font-size="88" font-weight="700" fill="#FF9900">The demos</text>
  <text x="80" y="906" font-size="88" font-weight="700" fill="#FF9900">are over.</text>

  <!-- sub -->
  <text x="80" y="1050" font-size="40" fill="#8FA3B8">5 gates before production —</text>
  <text x="80" y="1108" font-size="40" fill="#8FA3B8">and one question at every gate</text>

  <!-- footer -->
  <text x="80" y="1300" font-size="24" fill="#8FA3B8">Build. Document. Share. Repeat.</text>
</svg>
