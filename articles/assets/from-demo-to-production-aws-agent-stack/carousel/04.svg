<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1080" height="1350" fill="#1E2A38"/>

  <text x="1000" y="110" text-anchor="end" font-family="SF Mono, Menlo, Monaco, monospace" font-size="34" fill="#8FA3B8">4/9</text>

  <!-- gate marker -->
  <text x="80" y="200" font-family="SF Mono, Menlo, Monaco, monospace" font-size="40" font-weight="700" fill="#FF9900">GATE 1 + 2</text>

  <!-- headline -->
  <text x="80" y="380" font-size="76" font-weight="700" fill="#F5F7FA">Start smaller</text>
  <text x="80" y="470" font-size="76" font-weight="700" fill="#F5F7FA">than you</text>
  <text x="80" y="560" font-size="76" font-weight="700" fill="#F5F7FA">want to.</text>

  <!-- three ones -->
  <rect x="80" y="680" width="6" height="230" fill="#FF9900"/>
  <text x="120" y="740" font-size="48" fill="#F5F7FA"><tspan font-weight="700" fill="#FF9900">One</tspan> agent.</text>
  <text x="120" y="812" font-size="48" fill="#F5F7FA"><tspan font-weight="700" fill="#FF9900">One</tspan> tool.</text>
  <text x="120" y="884" font-size="48" fill="#F5F7FA"><tspan font-weight="700" fill="#FF9900">One</tspan> clear job.</text>

  <!-- body -->
  <text x="80" y="1020" font-size="40" fill="#8FA3B8">Prove the loop closes on the</text>
  <text x="80" y="1076" font-size="40" fill="#8FA3B8">managed harness before</text>
  <text x="80" y="1132" font-size="40" fill="#8FA3B8">anything fancy.</text>

  <text x="80" y="1300" font-size="24" fill="#8FA3B8">Build. Document. Share. Repeat.</text>
</svg>
