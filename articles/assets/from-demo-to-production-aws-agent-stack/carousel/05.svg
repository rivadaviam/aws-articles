<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1080" height="1350" fill="#1E2A38"/>

  <text x="1000" y="110" text-anchor="end" font-family="SF Mono, Menlo, Monaco, monospace" font-size="34" fill="#8FA3B8">5/9</text>

  <text x="80" y="200" font-family="SF Mono, Menlo, Monaco, monospace" font-size="40" font-weight="700" fill="#FF9900">GATE 3</text>

  <!-- headline -->
  <text x="80" y="360" font-size="76" font-weight="700" fill="#F5F7FA">Evaluate</text>
  <text x="80" y="450" font-size="76" font-weight="700" fill="#FF9900">BEFORE</text>
  <text x="80" y="540" font-size="76" font-weight="700" fill="#F5F7FA">you scale.</text>

  <!-- body -->
  <text x="80" y="700" font-size="42" fill="#F5F7FA"><tspan font-family="SF Mono, Menlo, Monaco, monospace" font-weight="700" fill="#FF9900">13</tspan> built-in evaluators</text>
  <text x="80" y="760" font-size="42" fill="#F5F7FA">+ Ground Truth.</text>

  <text x="80" y="870" font-size="42" fill="#F5F7FA">Score against expected</text>
  <text x="80" y="930" font-size="42" fill="#F5F7FA">answers, not vibes.</text>

  <!-- muted punch -->
  <rect x="80" y="1030" width="6" height="140" fill="#FF9900"/>
  <text x="120" y="1075" font-size="38" fill="#8FA3B8">If you can't measure it,</text>
  <text x="120" y="1123" font-size="38" fill="#8FA3B8">you can't run it unattended.</text>

  <text x="80" y="1300" font-size="24" fill="#8FA3B8">Build. Document. Share. Repeat.</text>
</svg>
