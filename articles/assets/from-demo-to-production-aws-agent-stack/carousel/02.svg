<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1080" height="1350" fill="#1E2A38"/>

  <text x="1000" y="110" text-anchor="end" font-family="SF Mono, Menlo, Monaco, monospace" font-size="34" fill="#8FA3B8">2/9</text>

  <!-- eyebrow -->
  <text x="80" y="200" font-size="36" font-weight="700" fill="#FF9900" letter-spacing="2">THE PITCH CHANGED</text>

  <!-- headline -->
  <text x="80" y="330" font-size="66" font-weight="700" fill="#F5F7FA">From "try this model"</text>
  <text x="80" y="410" font-size="66" font-weight="700" fill="#F5F7FA">to "put agents</text>
  <text x="80" y="490" font-size="66" font-weight="700" fill="#F5F7FA">to work"</text>

  <!-- body -->
  <text x="80" y="660" font-size="40" fill="#F5F7FA">Bedrock grew from</text>
  <text x="80" y="716" font-size="40" fill="#F5F7FA"><tspan font-family="SF Mono, Menlo, Monaco, monospace" fill="#FF9900">~60</tspan> to <tspan font-family="SF Mono, Menlo, Monaco, monospace" fill="#FF9900">~100</tspan> models.</text>

  <text x="80" y="830" font-size="40" fill="#F5F7FA">Frontier agents run for</text>
  <text x="80" y="886" font-size="40" fill="#F5F7FA">hours or days, unattended.</text>

  <!-- muted punch -->
  <rect x="80" y="1000" width="6" height="90" fill="#FF9900"/>
  <text x="120" y="1035" font-size="40" fill="#8FA3B8">Unattended is where</text>
  <text x="120" y="1085" font-size="40" fill="#8FA3B8">the bills happen.</text>

  <text x="80" y="1300" font-size="24" fill="#8FA3B8">Build. Document. Share. Repeat.</text>
</svg>
