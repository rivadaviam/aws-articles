<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1200" height="675" fill="#1E2A38"/>

  <!-- title -->
  <text x="60" y="78" fill="#F5F7FA" font-size="40" font-weight="700">The minimum path: idea to production</text>
  <text x="60" y="118" fill="#8FA3B8" font-size="26">Front-load the questions that cost money when ignored</text>

  <!-- step boxes: 5 boxes w=190 h=170 at y=210; x: 60, 285, 510, 735, 960; gaps 35 with arrows -->
  <!-- box 1: Idea -->
  <rect x="60" y="210" width="190" height="170" fill="#2A3B4F"/>
  <text x="78" y="248" fill="#FF9900" font-size="24" font-weight="700" font-family="SF Mono, Menlo, Monaco, monospace">1</text>
  <text x="155" y="285" fill="#F5F7FA" font-size="30" font-weight="700" text-anchor="middle">Idea</text>
  <text x="155" y="322" fill="#8FA3B8" font-size="22" text-anchor="middle">one agent,</text>
  <text x="155" y="348" fill="#8FA3B8" font-size="22" text-anchor="middle">one clear job</text>

  <!-- arrow 1 -->
  <line x1="250" y1="295" x2="279" y2="295" stroke="#FF9900" stroke-width="4"/>
  <path d="M 279 287 L 293 295 L 279 303 Z" fill="#FF9900"/>

  <!-- box 2: Harness -->
  <rect x="285" y="210" width="190" height="170" fill="#2A3B4F"/>
  <text x="303" y="248" fill="#FF9900" font-size="24" font-weight="700" font-family="SF Mono, Menlo, Monaco, monospace">2</text>
  <text x="380" y="285" fill="#F5F7FA" font-size="30" font-weight="700" text-anchor="middle">Harness</text>
  <text x="380" y="322" fill="#8FA3B8" font-size="22" text-anchor="middle">managed runtime,</text>
  <text x="380" y="348" fill="#8FA3B8" font-size="22" text-anchor="middle">prove the loop closes</text>

  <!-- arrow 2 -->
  <line x1="475" y1="295" x2="504" y2="295" stroke="#FF9900" stroke-width="4"/>
  <path d="M 504 287 L 518 295 L 504 303 Z" fill="#FF9900"/>

  <!-- box 3: Evaluations -->
  <rect x="510" y="210" width="190" height="170" fill="#2A3B4F"/>
  <text x="528" y="248" fill="#FF9900" font-size="24" font-weight="700" font-family="SF Mono, Menlo, Monaco, monospace">3</text>
  <text x="605" y="285" fill="#F5F7FA" font-size="30" font-weight="700" text-anchor="middle">Evaluate</text>
  <text x="605" y="322" fill="#8FA3B8" font-size="22" text-anchor="middle">13 evaluators +</text>
  <text x="605" y="348" fill="#8FA3B8" font-size="22" text-anchor="middle">Ground Truth, first</text>

  <!-- arrow 3 -->
  <line x1="700" y1="295" x2="729" y2="295" stroke="#FF9900" stroke-width="4"/>
  <path d="M 729 287 L 743 295 L 729 303 Z" fill="#FF9900"/>

  <!-- box 4: Policy -->
  <rect x="735" y="210" width="190" height="170" fill="#2A3B4F"/>
  <text x="753" y="248" fill="#FF9900" font-size="24" font-weight="700" font-family="SF Mono, Menlo, Monaco, monospace">4</text>
  <text x="830" y="285" fill="#F5F7FA" font-size="30" font-weight="700" text-anchor="middle">Policy</text>
  <text x="830" y="322" fill="#8FA3B8" font-size="22" text-anchor="middle">lock tools while</text>
  <text x="830" y="348" fill="#8FA3B8" font-size="22" text-anchor="middle">the surface is small</text>

  <!-- arrow 4 -->
  <line x1="925" y1="295" x2="954" y2="295" stroke="#FF9900" stroke-width="4"/>
  <path d="M 954 287 L 968 295 L 954 303 Z" fill="#FF9900"/>

  <!-- box 5: Deploy -->
  <rect x="960" y="210" width="190" height="170" fill="#2A3B4F"/>
  <text x="978" y="248" fill="#FF9900" font-size="24" font-weight="700" font-family="SF Mono, Menlo, Monaco, monospace">5</text>
  <text x="1055" y="285" fill="#F5F7FA" font-size="30" font-weight="700" text-anchor="middle">Deploy</text>
  <text x="1055" y="322" fill="#8FA3B8" font-size="22" text-anchor="middle">check 200 TPS +</text>
  <text x="1055" y="348" fill="#8FA3B8" font-size="22" text-anchor="middle">session cap first</text>

  <!-- cost gate strip -->
  <line x1="60" y1="440" x2="1150" y2="440" stroke="#3A4D63" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="60" y="490" fill="#FF6B6B" font-size="26" font-weight="700">$ Ask the cost question at every gate:</text>
  <text x="60" y="526" fill="#8FA3B8" font-size="24">model tokens · session time · tool invocations · egress — find the meters before you find the bill</text>

  <!-- footer -->
  <text x="60" y="636" fill="#8FA3B8" font-size="22">Framework: Build-to-Learn applied to AWS AgentCore</text>
  <text x="60" y="663" fill="#8FA3B8" font-size="22">Build. Document. Share. Repeat.</text>
  <text x="1140" y="663" fill="#8FA3B8" font-size="22" text-anchor="end">Build-to-Learn with AWS GenAI</text>
</svg>
